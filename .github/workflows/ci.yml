name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install core dependencies
        run: |
          pip install pandas numpy scikit-learn statsmodels scipy xgboost \
                      shap matplotlib seaborn plotly pytest sqlalchemy psycopg2-binary

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ --max-line-length=120 --select=E9,F63,F7,F82 --extend-ignore=F821

      - name: Run tests
        run: pytest tests/test_kpi_metrics.py tests/test_experimentation.py -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t creatorscope:latest .
